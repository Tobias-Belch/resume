name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'resumes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment:
      name: production
      url: https://tobias-belch.github.io/resume/
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate PDFs
        run: |
          npm install puppeteer
          node -e "
            const puppeteer = require('puppeteer');
            const fs = require('fs');
            const path = require('path');
            (async () => {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const files = fs.readdirSync('resumes').filter(f => f.endsWith('.html') && f !== 'pdfs.html');
              for (const file of files) {
                const page = await browser.newPage();
                await page.emulateMediaType('print');
                await page.goto('file://' + path.resolve('resumes', file), { waitUntil: 'networkidle0' });
                await page.pdf({
                  path: 'resumes/' + (file === 'index.html' ? 'cv.tobias-belch.pdf' : 'cv.tobias-belch.' + file.replace('.html', '.pdf')),
                  format: 'A4',
                  printBackground: true
                });
                console.log('Generated PDF for', file);
              }
              await browser.close();
            })();
          "

      - name: Sync pdfs.html with existing PDF files
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'resumes';
            const pdfs = fs.readdirSync(dir)
              .filter(f => f.endsWith('.pdf'))
              .sort();
            const links = pdfs.map(f => '        <li><a href=\"' + f + '\">' + f + '</a></li>').join('\n');
            const html = '<!doctype html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\" />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />\n    <title>PDF Downloads &ndash; Tobias Belch</title>\n    <style>\n      * { box-sizing: border-box; margin: 0; padding: 0; }\n      body {\n        font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n        font-size: 15px;\n        background: #f4f4f4;\n        color: #222;\n        padding: 40px 20px;\n      }\n      main { max-width: 640px; margin: 0 auto; }\n      h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: #111; }\n      ul { list-style: none; }\n      li {\n        padding: 10px 14px;\n        background: #fff;\n        border: 1px solid #ddd;\n        border-radius: 6px;\n        margin-bottom: 8px;\n      }\n      li:hover { background: #fafafa; }\n      a { color: #1a73e8; text-decoration: none; }\n      a:hover { text-decoration: underline; }\n    </style>\n  </head>\n  <body>\n    <main>\n      <h1>PDF Downloads</h1>\n      <ul>\n' + links + '\n      </ul>\n    </main>\n  </body>\n</html>\n';
            fs.writeFileSync(path.join(dir, 'pdfs.html'), html);
            console.log('Synced pdfs.html with', pdfs.length, 'PDF(s)');
          "

      - name: Commit and push generated PDFs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resumes/*.pdf resumes/pdfs.html
          git diff --cached --quiet || git commit -m "chore: update generated PDFs [skip ci]"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: resumes
          publish_branch: gh-pages
