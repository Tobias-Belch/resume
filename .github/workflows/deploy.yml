name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'resumes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment:
      name: production
      url: https://tobias-belch.github.io/resume/
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate PDFs
        run: |
          npm install puppeteer
          node -e "
            const puppeteer = require('puppeteer');
            const fs = require('fs');
            const path = require('path');
            (async () => {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const files = fs.readdirSync('resumes').filter(f => f.endsWith('.html'));
              for (const file of files) {
                const page = await browser.newPage();
                await page.emulateMediaType('print');
                await page.goto('file://' + path.resolve('resumes', file), { waitUntil: 'networkidle0' });
                await page.pdf({
                  path: 'resumes/' + file.replace('.html', '.pdf'),
                  format: 'A4',
                  printBackground: true
                });
                console.log('Generated PDF for', file);
              }
              await browser.close();
            })();
          "

      - name: Commit and push generated PDFs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resumes/*.pdf
          git diff --cached --quiet || git commit -m "chore: update generated PDFs [skip ci]"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: resumes
          publish_branch: gh-pages
